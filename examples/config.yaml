# ZeroFetch Configuration File (YAML format)
# Location: ~/.config/zerofetch/config.yaml

# General display settings
general:
  # Separator between key and value
  separator: ":"
  
  # Compact mode - minimal spacing
  compact: false
  
  # Output format: "default", "json", "yaml", "toml", "plain"
  format: "default"

# Logo configuration
logo:
  # Logo type: "auto", "ascii", "kitty", "iterm", "none"
  logo_type: "auto"
  
  # Specific logo name (e.g., "ubuntu", "arch", "fedora")
  logo_name: null
  
  # Path to custom logo file
  logo_file: null
  
  # Remote logo URL
  logo_url: null
  
  # Padding between logo and info (spaces)
  padding: 2
  
  # Logo dimensions (for image scaling)
  width: null
  height: null
  
  # Override logo colors
  color_override: null

# Display settings
display:
  # Show color palette at the bottom
  show_colors: false
  
  # Color scheme
  color_scheme: "default"
  
  # Disable all colors
  no_color: false

# Module configuration
modules:
  # Order of modules to display
  order:
    - os
    - host
    - kernel
    - uptime
    - packages
    - shell
    - de
    - wm
    - terminal
    - cpu
    - gpu
    - memory
    - disk
    - battery
    - network
  
  # Explicitly enabled modules (empty = all enabled)
  enabled: []
  
  # Disabled modules
  disabled: []

# Color customization
colors:
  title: "cyan"
  key: "blue"
  value: "white"
  separator: "gray"
